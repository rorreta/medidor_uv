<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Radiación UV - Escuela de Turismo DuocUC</title>
    <style>
        :root {
            --color-bajo: #4caf50;
            --color-moderado: #fbc02d;
            --color-alto: #f57c00;
            --color-muy-alto: #d32f2f;
            --color-extremo: #7b1fa2;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --bg-default: #333;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0; /* Fondo de la página para contraste */
            color: var(--text-primary);
            text-align: center;
        }

        .phone-container {
            width: 360px; /* Ancho de un teléfono promedio */
            height: 740px; /* Alto de un teléfono promedio */
            background: #fff;
            border-radius: 36px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Simulación de la 'Isla Dinámica' / Notch */
        .phone-notch {
            width: 120px;
            height: 30px;
            background: #000;
            border-radius: 15px;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .screen {
            flex: 1;
            padding: 50px 25px 25px; /* Padding superior extra para el notch */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: background 0.5s ease;
            background-color: var(--bg-default);
        }

        .header {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-top: 20px;
        }

        .uv-value {
            font-size: 10rem;
            font-weight: 700;
            margin: -20px 0;
            line-height: 1;
        }

        .uv-label {
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .uv-scale {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            font-size: 11px;
            text-transform: uppercase;
            width: 100%;
        }

        .scale-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .scale-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .recommendation {
            font-size: 11px;
            text-align: left;
            margin-top: 15px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .location-info {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-top: 10px;
            text-align: left;
        }

        .footer {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 20px;
            text-transform: uppercase;
        }

        #location-status {
            font-size: 14px;
            color: #333;
        }

    </style>
</head>
<body>

    <div class="phone-container">
        <div class="phone-notch"></div>
        <div id="main-screen" class="screen">
            <div class="header">MONITOR DE RADIACIÓN UV - ESCUELA DE TURISMO DUOCUC</div>
            <div class="uv-value" id="uv-value">--.-</div>
            <div class="uv-label" id="uv-label">Cargando...</div>

            <div class="uv-scale">
                <div class="scale-item"><div class="scale-dot" style="background-color: var(--color-bajo);"></div> BAJO</div>
                <div class="scale-item"><div class="scale-dot" style="background-color: var(--color-moderado);"></div> MODERADO</div>
                <div class="scale-item"><div class="scale-dot" style="background-color: var(--color-alto);"></div> ALTO</div>
                <div class="scale-item"><div class="scale-dot" style="background-color: var(--color-muy-alto);"></div> MUY ALTO</div>
                <div class="scale-item"><div class="scale-dot" style="background-color: var(--color-extremo);"></div> EXTREMO</div>
            </div>

            <div class="recommendation" id="uv-recommendation">Obteniendo datos de ubicación y clima...</div>

            <div class="location-info">
                UBICACIÓN APROXIMADA: <span id="location-coords">--.-°, --.-°</span><br>
                CIUDAD PRINCIPAL MÁS CERCANA: <span id="location-city">--</span>
            </div>

            <div class="footer">DATOS PROPORCIONADOS POR API METEOROLÓGICA OFICIAL OPEN-METEO</div>
        </div>
    </div>

    <script>
        const uvValueEl = document.getElementById('uv-value');
        const uvLabelEl = document.getElementById('uv-label');
        const uvRecommendationEl = document.getElementById('uv-recommendation');
        const locationCoordsEl = document.getElementById('location-coords');
        const locationCityEl = document.getElementById('location-city');
        const screenEl = document.getElementById('main-screen');

        const uvData = {
            low: { label: 'Bajo', color: 'var(--color-bajo)', rec: 'Riesgo bajo. Use protector solar si estará expuesto al sol por largos periodos.' },
            moderate: { label: 'Moderado', color: 'var(--color-moderado)', rec: 'Riesgo moderado. Use protector solar, sombrero y gafas de sol.' },
            high: { label: 'Alto', color: 'var(--color-alto)', rec: 'Riesgo alto. Reduzca exposición entre 11 AM y 4 PM. Use ropa de manga larga y protector solar SPF 30+.' },
            veryHigh: { label: 'Muy Alto', color: 'var(--color-muy-alto)', rec: 'Riesgo muy alto. Reduzca exposición entre 11 AM y 4 PM. Use protector solar SPF 50+, sombrero de ala ancha, gafas de sol y camisa de manga larga.' },
            extreme: { label: 'Extremo', color: 'var(--color-extremo)', rec: 'Riesgo extremo. Evite salir durante las horas centrales del día. Use máxima protección solar (SPF 50+), ropa protectora y quédese a la sombra.' }
        };

        function getUvDetails(uvIndex) {
            if (uvIndex < 3) return uvData.low;
            if (uvIndex < 6) return uvData.moderate;
            if (uvIndex < 8) return uvData.high;
            if (uvIndex < 11) return uvData.veryHigh;
            return uvData.extreme;
        }

        async function fetchCityName(lat, lon) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
                const data = await response.json();
                if (data.address) {
                    const city = data.address.city || data.address.town || data.address.village || data.address.hamlet || 'Desconocida';
                    locationCityEl.textContent = city.toUpperCase();
                } else {
                    locationCityEl.textContent = 'NO ENCONTRADA';
                }
            } catch (error) {
                console.error("Error al obtener el nombre de la ciudad:", error);
                locationCityEl.textContent = 'ERROR DE RED';
            }
        }

        async function fetchUvData(lat, lon) {
            try {
                // Open-Meteo API URL para el índice UV actual
                const apiUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=uv_index&timezone=auto`;
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.current && data.current.uv_index !== undefined) {
                    const uvIndex = data.current.uv_index;
                    const uvDetails = getUvDetails(uvIndex);

                    uvValueEl.textContent = uvIndex.toFixed(1);
                    uvLabelEl.textContent = uvDetails.label;
                    uvRecommendationEl.textContent = uvDetails.rec;
                    screenEl.style.backgroundColor = uvDetails.color;

                    // Formatear coordenadas como en la imagen de referencia (ej: 33.05° S, 71.61° W)
                    const latDir = lat >= 0 ? 'N' : 'S';
                    const lonDir = lon >= 0 ? 'E' : 'W';
                    locationCoordsEl.textContent = `${Math.abs(lat).toFixed(4)}° ${latDir}, ${Math.abs(lon).toFixed(4)}° ${lonDir}`;

                    // Obtener el nombre de la ciudad
                    fetchCityName(lat, lon);

                } else {
                    uvLabelEl.textContent = 'Error';
                    uvRecommendationEl.textContent = 'No se pudieron obtener datos UV para esta ubicación.';
                }

            } catch (error) {
                console.error("Error al obtener datos climáticos:", error);
                uvLabelEl.textContent = 'Error';
                uvRecommendationEl.textContent = 'Error al conectar con la API de clima.';
            }
        }

        function getLocation() {
            if (navigator.geolocation) {
                uvLabelEl.textContent = 'Localizando...';
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        // Actualizar coordenadas de marcador de posición antes de la llamada a la API
                        locationCoordsEl.textContent = `${latitude.toFixed(2)}°, ${longitude.toFixed(2)}°`;
                        fetchUvData(latitude, longitude);
                    },
                    (error) => {
                        console.error("Error de geolocalización:", error);
                        uvLabelEl.textContent = 'Ubicación Denegada';
                        uvRecommendationEl.textContent = 'Por favor, permita el acceso a la ubicación para ver el índice UV de su zona.';
                        screenEl.style.backgroundColor = var(--bg-default);
                    }
                );
            } else {
                uvLabelEl.textContent = 'No Soportado';
                uvRecommendationEl.textContent = 'Su navegador no soporta geolocalización.';
            }
        }

        // Iniciar el proceso
        getLocation();

    </script>
</body>
</html>
