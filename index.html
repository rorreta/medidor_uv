<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitor UV - Turismo DuocUC</title>
    <style>
        :root {
            --color-bajo: #4caf50;
            --color-moderado: #fbc02d;
            --color-alto: #f57c00;
            --color-muy-alto: #d32f2f;
            --color-extremo: #7b1fa2;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.85);
            --bg-default: #444;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Previene scroll en el body */
        }

        .phone-container {
            width: 100%;
            max-width: 380px; /* Ancho máximo para simular teléfono en desktop */
            height: 100vh; /* Ocupa todo el alto de la pantalla móvil */
            background: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Simulación de marco de teléfono en pantallas grandes */
        @media (min-width: 450px) {
            .phone-container {
                height: 780px;
                border-radius: 45px;
                padding: 15px;
                box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            }
        }

        .screen {
            width: 100%;
            height: 100%;
            background-color: var(--bg-default);
            display: flex;
            flex-direction: column;
            padding: 40px 25px 25px; /* Padding superior ajustado */
            transition: background-color 0.8s ease;
            overflow: hidden;
        }

        /* Redondear esquinas solo en simulación desktop */
        @media (min-width: 450px) {
            .screen {
                border-radius: 35px;
            }
        }

        /* --- Secciones --- */

        .header-section {
            text-align: center;
            margin-bottom: 15px;
        }

        .header {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--text-secondary);
          
        }

        /* NUEVO: Datos de georreferencia sobre el índice, centrados */
        .location-section-top {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .main-uv-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centrado vertical del círculo */
            align-items: center;
            margin-bottom: 25px;
        }

        /* NUEVO: Contenedor del círculo del índice */
        .uv-circle {
            width: 300px;
            height: 300px;
            border: 12px solid var(--text-primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .uv-value {
            font-size: 110px; /* Ajustado para caber en el círculo */
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
        }

        .uv-label {
            font-size: 40px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-primary);
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .uv-scale {
            text-align: left;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-primary);
        }

        .scale-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 12px;
        }

        .recommendation {
            font-size: 12px;
            text-align: left;
            line-height: 1.6;
            color: var(--text-primary);
            min-height: 70px;
            border-left: 3px solid rgba(255,255,255,0.3);
            padding-left: 15px;
        }

        .footer-section {
            text-align: center;
            margin-top: auto; /* Empuja al fondo */
            padding-top: 15px;
        }

        .footer {
            font-size: 9px;
            opacity: 0.7;
            font-weight: bold;
            color: var(--text-primary);
            text-transform: uppercase;
        }

    </style>
</head>
<body>

    <div class="phone-container">
        <div class="screen" id="screen">
            
            <div class="header-section">
                <div class="header"> Indice UV (en vivo)</div>
                <div class="header">[rvidall]</div>
            </div>

            <!-- MODIFICADO: Georreferencia arriba y centrada -->
            <div class="location-section-top">
                CIUDAD: <span id="city-top">DETECTANDO...</span><br>
                COORDENADAS: <span id="coords-top">--.--, --.--</span>
            </div>

            <div class="main-uv-section">
                <!-- MODIFICADO: Valor del índice en un círculo -->
                <div class="uv-circle">
                    <div class="uv-value" id="uv-num">--</div>
                </div>
                <div class="uv-label" id="uv-text">CARGANDO...</div>
            </div>

            <div class="info-section">
                <div class="uv-scale">
                    <div class="scale-item"><div class="dot" style="background: var(--color-bajo)"></div> ( 0-2 ) BAJO </div>
                    <div class="scale-item"><div class="dot" style="background: var(--color-moderado)"></div> ( 3-5 ) MODERADO</div>
                    <div class="scale-item"><div class="dot" style="background: var(--color-alto)"></div> ( 6-7 ) ALTO </div>
                    <div class="scale-item"><div class="dot" style="background: var(--color-muy-alto)"></div> ( 8-10) MUY ALTO </div>
                    <div class="scale-item"><div class="dot" style="background: var(--color-extremo)"></div> ( 11+ ) EXTREMO </div>
                </div>

                <div class="recommendation" id="rec-text">
                    Por favor, permite el acceso a tu ubicación para obtener los datos UV en tiempo real.
                </div>
            </div>

            <div class="footer-section">
                <div class="footer">DATOS: API OPEN-METEO & NOMINATIM</div>
            </div>
        </div>
    </div>

    <script>
        const config = {
            low: { color: '#4caf50', text: 'Bajo', rec: 'Riesgo bajo. No se requiere protección especial para periodos cortos.' },
            mod: { color: '#fbc02d', text: 'Moderado', rec: 'Riesgo moderado. Mantente a la sombra en horas centrales. Usa protector y sombrero.' },
            high: { color: '#f57c00', text: 'Alto', rec: 'Riesgo alto. Reduce exposición entre 11am y 4pm. Usa SPF 30+, gafas y camisa.' },
            vhigh: { color: '#d32f2f', text: 'Muy Alto', rec: 'Riesgo MUY ALTO. Evita el sol al mediodía. Camisa larga, gafas y SPF 50+ son obligatorios.' },
            ext: { color: '#7b1fa2', text: 'Extremo', rec: 'Riesgo EXTREMO. Evita salir. La piel sin protección se quema en minutos.' }
        };

        async function updateUI(lat, lon) {
            try {
                // 1. Actualizar Coordenadas inmediatamente
                document.getElementById('coords-top').innerText = `${lat.toFixed(2)}°, ${lon.toFixed(2)}°`;

                // 2. Obtener Índice UV de Open-Meteo
                const uvRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=uv_index&timezone=auto`);
                const uvData = await uvRes.json();
                const uv = uvData.current.uv_index;

                // 3. Obtener Ciudad (Reverse Geocoding)
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=es`);
                const geoData = await geoRes.json();
                
                // Priorizar ciudad, luego pueblo, luego villa
                const city = geoData.address.city || geoData.address.town || geoData.address.village || "Ubicación Desconocida";

                // 4. Determinar nivel UV
                let level = config.low;
                if (uv >= 3) level = config.mod;
                if (uv >= 6) level = config.high;
                if (uv >= 8) level = config.vhigh;
                if (uv >= 11) level = config.ext;

                // 5. Aplicar cambios a la interfaz
                document.getElementById('screen').style.backgroundColor = level.color;
                document.getElementById('uv-num').innerText = uv.toFixed(1);
                document.getElementById('uv-text').innerText = level.text;
                document.getElementById('rec-text').innerText = level.rec;
                document.getElementById('city-top').innerText = city.toUpperCase();

            } catch (err) {
                console.error("Error actualizando la interfaz:", err);
                document.getElementById('uv-text').innerText = "Error";
                document.getElementById('rec-text').innerText = "Hubo un problema al conectar con los servicios meteorológicos o de ubicación.";
            }
        }

        function init() {
            if ("geolocation" in navigator) {
                // Opción de alta precisión para móviles
                const geoOptions = {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                };

                navigator.geolocation.getCurrentPosition(
                    pos => updateUI(pos.coords.latitude, pos.coords.longitude),
                    err => {
                        console.error("Error de geolocalización:", err);
                        document.getElementById('uv-text').innerText = "Bloqueado";
                        document.getElementById('city-top').innerText = "ACCESO DENEGADO";
                        document.getElementById('rec-text').innerText = "Activa los permisos de ubicación en tu navegador y recarga la página para usar esta herramienta.";
                    },
                    geoOptions
                );
            } else {
                document.getElementById('uv-text').innerText = "No Soportado";
                document.getElementById('city-top').innerText = "NAVEGADOR ANTIGUO";
                document.getElementById('rec-text').innerText = "Tu navegador no soporta la detección de ubicación.";
            }
        }

        // Iniciar al cargar
        window.onload = init;
    </script>
</body>
</html>
