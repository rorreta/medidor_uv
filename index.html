<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor UV - Duoc UC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .uv-card { transition: all 0.5s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col items-center p-6">

    <!-- Header -->
    <header class="w-full max-w-md mb-8 text-center">
        <h1 class="text-2xl font-semibold tracking-tight">Índice UV Solar</h1>
        <p class="text-gray-500 text-sm">Escuela de Turismo | Duoc UC</p>
    </header>

    <!-- Main Card -->
    <main id="main-card" class="uv-card w-full max-w-md bg-white rounded-3xl shadow-sm border border-gray-100 p-8 text-center">
        <div id="loader" class="animate-pulse">
            <div class="h-4 bg-gray-200 rounded w-3/4 mx-auto mb-4"></div>
            <div class="h-20 bg-gray-200 rounded-full w-20 mx-auto mb-4"></div>
            <div class="h-4 bg-gray-200 rounded w-1/2 mx-auto"></div>
        </div>

        <div id="content" class="hidden">
            <p id="location-name" class="text-lg font-medium text-gray-700 mb-1">Cargando ubicación...</p>
            <p id="coords" class="text-xs text-gray-400 mb-6 uppercase tracking-widest"></p>
            
            <div id="uv-circle" class="w-32 h-32 rounded-full mx-auto flex flex-col items-center justify-center mb-6 border-8">
                <span id="uv-value" class="text-4xl font-bold">0</span>
                <span class="text-xs font-semibold uppercase">Índice</span>
            </div>

            <h2 id="uv-level" class="text-xl font-semibold mb-2">--</h2>
            <p id="uv-advice" class="text-sm text-gray-500 leading-relaxed"></p>
        </div>
    </main>

    <!-- Footer / Info -->
    <footer class="w-full max-w-md mt-auto pt-10 text-center text-xs text-gray-400">
        <p>Datos provistos por Open-Meteo • Basado en el estándar de la OMS</p>
    </footer>

    <script>
        const uvConfig = {
            1: { label: 'Bajo', color: '#3EA72D', text: 'white', advice: 'Puedes permanecer en el exterior sin riesgo.' },
            3: { label: 'Moderado', color: '#FFF300', text: 'black', advice: 'Usa protector solar y busca sombra en las horas centrales.' },
            6: { label: 'Alto', color: '#F18B00', text: 'white', advice: 'Usa sombrero, gafas de sol y protector solar FPS 30+.' },
            8: { label: 'Muy Alto', color: '#E53210', text: 'white', advice: 'Reduce la exposición entre las 11:00 y las 16:00 horas.' },
            11: { label: 'Extremo', color: '#B567A4', text: 'white', advice: 'Riesgo extremo. Evita salir. La piel puede quemarse en minutos.' }
        };

        function getUvDetails(value) {
            if (value < 3) return uvConfig[1];
            if (value < 6) return uvConfig[3];
            if (value < 8) return uvConfig[6];
            if (value < 11) return uvConfig[8];
            return uvConfig[11];
        }

        async function init() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const { latitude, longitude } = position.coords;
                    
                    try {
                        // 1. Obtener datos de Open-Meteo
                        const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=uv_index_max&timezone=auto&current_weather=true`);
                        const data = await response.json();
                        
                        // 2. Obtener nombre de ciudad (Reverse Geocoding básico)
                        const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                        const geoData = await geoRes.json();
                        const city = geoData.address.city || geoData.address.town || geoData.address.village || 'Ubicación Detectada';

                        // Actualizar UI
                        updateUI(data.daily.uv_index_max[0], city, latitude, longitude);
                    } catch (error) {
                        console.error("Error al obtener datos:", error);
                    }
                }, () => {
                    alert("Por favor, permite el acceso a la ubicación para ver el índice local.");
                });
            }
        }

        function updateUI(uvIndex, city, lat, lon) {
            const details = getUvDetails(uvIndex);
            
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
            
            document.getElementById('location-name').innerText = city;
            document.getElementById('coords').innerText = `${lat.toFixed(4)}° / ${lon.toFixed(4)}°`;
            
            const uvCircle = document.getElementById('uv-circle');
            const uvValue = document.getElementById('uv-value');
            const uvLevel = document.getElementById('uv-level');
            const uvAdvice = document.getElementById('uv-advice');

            uvCircle.style.borderColor = details.color;
            uvValue.innerText = uvIndex.toFixed(1);
            uvLevel.innerText = details.label;
            uvLevel.style.color = details.color === '#FFF300' ? '#D1A100' : details.color;
            uvAdvice.innerText = details.advice;
        }

        init();
    </script>
</body>
</html>
