<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor UV - DuocUC</title>
    <style>
        :root {
            --color-bajo: #4caf50;
            --color-moderado: #fbc02d;
            --color-alto: #f57c00;
            --color-muy-alto: #d32f2f;
            --color-extremo: #7b1fa2;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --bg-default: #444;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 360px;
            height: 760px;
            background: #000;
            border-radius: 40px;
            padding: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
        }

        .screen {
            width: 100%;
            height: 100%;
            border-radius: 30px;
            background-color: var(--bg-default);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px 25px 30px;
            box-sizing: border-box;
            transition: background-color 0.8s ease;
            overflow: hidden;
        }

        .header { font-size: 11px; font-weight: bold; letter-spacing: 1px; color: var(--text-secondary); }
        .uv-value { font-size: 110px; font-weight: 800; margin: 10px 0; }
        .uv-label { font-size: 38px; font-weight: 700; text-transform: uppercase; margin-bottom: 20px; }

        .uv-scale { text-align: left; font-size: 11px; font-weight: bold; }
        .scale-item { display: flex; align-items: center; margin-bottom: 5px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; }

        .recommendation { font-size: 12px; text-align: left; line-height: 1.5; min-height: 80px; }
        .location-box { font-size: 11px; text-align: left; border-top: 1px solid rgba(255,255,255,0.2); pt: 15px; padding-top: 15px; }
        .footer { font-size: 9px; opacity: 0.7; font-weight: bold; }

        /* Animación de carga */
        .loading { opacity: 0.5; font-style: italic; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="screen" id="screen">
            <div class="header">MONITOR DE RADIACIÓN UV - ESCUELA DE TURISMO DUOCUC</div>
            
            <div id="content">
                <div class="uv-value" id="uv-num">--</div>
                <div class="uv-label" id="uv-text">Cargando...</div>
            </div>

            <div class="uv-scale">
                <div class="scale-item"><div class="dot" style="background: var(--color-bajo)"></div> BAJO</div>
                <div class="scale-item"><div class="dot" style="background: var(--color-moderado)"></div> MODERADO</div>
                <div class="scale-item"><div class="dot" style="background: var(--color-alto)"></div> ALTO</div>
                <div class="scale-item"><div class="dot" style="background: var(--color-muy-alto)"></div> MUY ALTO</div>
                <div class="scale-item"><div class="dot" style="background: var(--color-extremo)"></div> EXTREMO</div>
            </div>

            <div class="recommendation" id="rec-text">
                Por favor, permite el acceso a tu ubicación para obtener los datos en tiempo real.
            </div>

            <div class="location-box">
                UBICACIÓN: <span id="coords">Detectando...</span><br>
                CIUDAD: <span id="city">---</span>
            </div>

            <div class="footer">DATOS: API OPEN-METEO & NOMINATIM</div>
        </div>
    </div>

    <script>
        const config = {
            low: { color: '#4caf50', text: 'Bajo', rec: 'Riesgo bajo. No se requiere protección especial para periodos cortos.' },
            mod: { color: '#fbc02d', text: 'Moderado', rec: 'Riesgo moderado. Mantente a la sombra en horas centrales. Usa protector y sombrero.' },
            high: { color: '#f57c00', text: 'Alto', rec: 'Riesgo alto. Reduce exposición entre 11am y 4pm. Usa SPF 30+, gafas y camisa.' },
            vhigh: { color: '#d32f2f', text: 'Muy Alto', rec: 'Riesgo MUY ALTO. Evita el sol al mediodía. Camisa larga, gafas y SPF 50+ son obligatorios.' },
            ext: { color: '#7b1fa2', text: 'Extremo', rec: 'Riesgo EXTREMO. Evita salir. La piel sin protección se quema en minutos.' }
        };

        async function updateUI(lat, lon) {
            try {
                // 1. Obtener Índice UV de Open-Meteo
                const uvRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=uv_index&timezone=auto`);
                const uvData = await uvRes.json();
                const uv = uvData.current.uv_index;

                // 2. Obtener Ciudad (Reverse Geocoding)
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
                const geoData = await geoRes.json();
                const city = geoData.address.city || geoData.address.town || geoData.address.village || "Desconocida";

                // 3. Determinar nivel
                let level = config.low;
                if (uv >= 3) level = config.mod;
                if (uv >= 6) level = config.high;
                if (uv >= 8) level = config.vhigh;
                if (uv >= 11) level = config.ext;

                // 4. Aplicar a la interfaz
                document.getElementById('screen').style.backgroundColor = level.color;
                document.getElementById('uv-num').innerText = uv.toFixed(1);
                document.getElementById('uv-text').innerText = level.text;
                document.getElementById('rec-text').innerText = level.rec;
                document.getElementById('coords').innerText = `${lat.toFixed(2)}°, ${lon.toFixed(2)}°`;
                document.getElementById('city').innerText = city.toUpperCase();

            } catch (err) {
                document.getElementById('uv-text').innerText = "Error";
                document.getElementById('rec-text').innerText = "Hubo un problema al conectar con los servicios meteorológicos.";
            }
        }

        function init() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    pos => updateUI(pos.coords.latitude, pos.coords.longitude),
                    err => {
                        document.getElementById('uv-text').innerText = "Bloqueado";
                        document.getElementById('rec-text').innerText = "Activa la ubicación en tu navegador para usar esta herramienta.";
                    }
                );
            } else {
                document.getElementById('uv-text').innerText = "No Soportado";
            }
        }

        init();
    </script>
</body>
</html>
