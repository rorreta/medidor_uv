<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UV Valparaíso | Dashboard</title>
    <!-- Tailwind para diseño, Chart.js para el gráfico -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full space-y-4">
        
        <!-- CARD PRINCIPAL: UV HOY -->
        <div class="glass border border-white rounded-[2rem] p-8 shadow-xl text-center">
            <header class="flex justify-between items-center mb-6">
                <div class="text-left">
                    <h1 class="text-2xl font-800 text-slate-800 tracking-tight">Valparaíso</h1>
                    <p class="text-slate-400 text-sm font-medium" id="current-date">-- de --</p>
                </div>
                <span class="bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider border border-blue-100">
                    V Región
                </span>
            </header>

            <div class="py-4">
                <p class="text-slate-400 text-xs uppercase font-bold tracking-widest mb-2">Máximo Hoy</p>
                <div id="uv-number" class="text-9xl font-black tracking-tighter transition-all duration-1000">--</div>
                <div id="uv-badge" class="mt-4 inline-block px-6 py-2 rounded-2xl font-bold text-white shadow-lg">...</div>
            </div>
        </div>

        <!-- CARD GRÁFICO: PRONÓSTICO 7 DÍAS -->
        <div class="glass border border-white rounded-[2rem] p-6 shadow-xl">
            <h3 class="text-slate-700 font-bold mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" />
                </svg>
                Tendencia de la Semana
            </h3>
            <div class="h-48 w-full">
                <canvas id="uvChart"></canvas>
            </div>
        </div>

        <footer class="text-center text-slate-400 text-[10px] uppercase tracking-widest">
            Actualización Automática vía Open-Meteo • 2026
        </footer>
    </div>

    <script>
        const ctx = document.getElementById('uvChart').getContext('2d');
        let uvChart;

        async function initDashboard() {
            const lat = -33.0472;
            const lon = -71.6127;
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=uv_index_max,temperature_2m_max&timezone=auto`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // 1. Actualizar Datos de Hoy
                const todayUV = data.daily.uv_index_max[0];
                updateHero(todayUV);
                
                // 2. Formatear Fechas para el gráfico
                const labels = data.daily.time.map(date => {
                    const d = new Date(date + 'T00:00:00');
                    return d.toLocaleDateString('es-CL', { weekday: 'short' });
                });

                // 3. Crear el Gráfico
                renderChart(labels, data.daily.uv_index_max);
                
                // Fecha actual en el header
                document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-CL', { day: 'numeric', month: 'long' });

            } catch (error) {
                console.error("Error:", error);
            }
        }

        function updateHero(val) {
            const numEl = document.getElementById('uv-number');
            const badgeEl = document.getElementById('uv-badge');
            numEl.innerText = val.toFixed(1);

            let color = '#9333ea'; // Extremo (Púrpura)
            let label = 'Extremo';
            let bg = 'bg-purple-600';

            if (val <= 2) { color = '#22c55e'; label = 'Bajo'; bg = 'bg-green-500'; }
            else if (val <= 5) { color = '#eab308'; label = 'Moderado'; bg = 'bg-yellow-500'; }
            else if (val <= 7) { color = '#f97316'; label = 'Alto'; bg = 'bg-orange-500'; }
            else if (val <= 10) { color = '#dc2626'; label = 'Muy Alto'; bg = 'bg-red-600'; }

            numEl.style.color = color;
            badgeEl.className = `mt-4 inline-block px-6 py-2 rounded-2xl font-bold text-white shadow-lg transition-all ${bg}`;
            badgeEl.innerText = `Riesgo ${label}`;
        }

        function renderChart(labels, values) {
            uvChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Índice UV Máx',
                        data: values,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#3b82f6',
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { display: false }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        initDashboard();
    </script>
</body>
</html>
